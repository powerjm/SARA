repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep in lockstep with the pinned `ruff` dev dependency in pyproject.toml
    # so pre-commit, `make lint`/`make format`, and CI all use the same ruff.
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
