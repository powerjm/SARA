name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Limit to one in-flight run per branch; cancel older runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: pytest (py${{ matrix.python }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-26.04]
        python: ["3.14"]
        # Add "3.15" here once it ships and the optional analysis deps publish wheels for it.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Install with dev + analysis extras. binary-tools is intentionally
          # omitted (pwntools/r2pipe need system libraries not present in CI).
          pip install -e ".[dev,analysis]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        # mypy is informational on CI for now: the codebase has Phase-N stubs
        # whose precise typing will firm up as implementations land.
        run: mypy . || true

      - name: Run pytest
        run: pytest -q --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage XML
        if: matrix.python == '3.14'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 7

  sandbox-image:
    name: sandbox image (build only)
    runs-on: ubuntu-26.04
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build sandbox image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.sandbox
          push: false
          tags: agentic-rop-sandbox:ci
          # Use the GitHub Actions cache backend to speed up incremental builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
